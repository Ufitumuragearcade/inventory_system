<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Asset | Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-shell">
        <div class="topbar">
            <div>
                <h2>Return Asset</h2>
                <p class="muted">Returning an asset marks the transaction as returned and changes the asset status to <strong>returned</strong>.</p>
            </div>
            <div class="nav-links">
                <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                <a class="nav-link" th:href="@{/assets}">Assets</a>
                <a class="nav-link" th:href="@{/assign}">Assign</a>
                <a class="nav-link active" th:href="@{/return}">Return</a>
                <a class="nav-link" th:href="@{/reports}">Reports</a>
                <a class="nav-link" th:href="@{/users}">Users</a>
                <a class="nav-link logout-link" th:href="@{/logout}">Logout</a>
            </div>
        </div>

        <div th:if="${successMessage}" class="message message-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="message message-error" th:text="${errorMessage}"></div>

        <div class="content-grid">
            <div class="panel">
                <h3 class="section-title">Return Form</h3>
                <form th:action="@{/return}" method="post" class="form-grid">
                    <div>
                        <label class="label" for="transactionId">Assigned Asset</label>
                        <select class="select" id="transactionId" name="transactionId" required>
                            <option value="">Choose assigned asset</option>
                            <option th:each="tx : ${activeTransactions}" th:value="${tx.id}"
                                    th:text="${tx.assetName + ' - ' + tx.userName + ' (' + tx.department + ')'}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="label" for="message">Return Note</label>
                        <textarea class="textarea" id="message" name="message" placeholder="Optional condition or return note"></textarea>
                    </div>

                    <div class="actions">
                        <button class="btn btn-primary" type="submit">Return Asset</button>
                    </div>
                </form>
            </div>

            <div class="table-card">
                <h3 class="section-title">Assigned Assets</h3>
                <div th:if="${#lists.isEmpty(activeTransactions)}" class="empty-state">
                    No assets are currently assigned.
                </div>
                <div th:unless="${#lists.isEmpty(activeTransactions)}" class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Asset</th>
                                <th>User</th>
                                <th>Department</th>
                                <th>Issued</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tx : ${activeTransactions}">
                                <td th:text="${tx.assetName}"></td>
                                <td th:text="${tx.userName}"></td>
                                <td th:text="${tx.department}"></td>
                                <td th:text="${tx.issueDate != null ? #temporals.format(tx.issueDate, 'yyyy-MM-dd HH:mm') : ''}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
