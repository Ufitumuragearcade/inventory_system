<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-shell">
        <div class="topbar">
            <div>
                <h2>Reports</h2>
                <p class="muted">Search and filter inventory transactions by time, type, department, and status.</p>
            </div>
            <div class="nav-links">
                <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                <a class="nav-link" th:href="@{/assets}">Assets</a>
                <a class="nav-link" th:href="@{/assign}">Assign</a>
                <a class="nav-link" th:href="@{/return}">Return</a>
                <a class="nav-link active" th:href="@{/reports}">Reports</a>
                <a class="nav-link" th:href="@{/users}">Users</a>
                <a class="nav-link logout-link" th:href="@{/logout}">Logout</a>
            </div>
        </div>

        <div class="panel" style="margin-bottom: 24px;">
            <h3 class="section-title">Search Filters</h3>
            <form th:action="@{/reports}" method="get" class="form-grid" style="margin-top: 18px;">
                <div class="form-row">
                    <div>
                        <label class="label" for="startDate">Start Date</label>
                        <input class="field" id="startDate" name="startDate" type="date" th:value="${startDate}">
                    </div>
                    <div>
                        <label class="label" for="endDate">End Date</label>
                        <input class="field" id="endDate" name="endDate" type="date" th:value="${endDate}">
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label class="label" for="assetType">Asset Type</label>
                        <select class="select" id="assetType" name="assetType">
                            <option value="">All asset types</option>
                            <option th:each="type : ${assetTypes}" th:value="${type}" th:text="${type}"
                                    th:selected="${type == assetType}"></option>
                        </select>
                    </div>
                    <div>
                        <label class="label" for="department">Department</label>
                        <select class="select" id="department" name="department">
                            <option value="">All departments</option>
                            <option th:each="dept : ${departments}" th:value="${dept}" th:text="${dept}"
                                    th:selected="${dept == department}"></option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="label" for="status">Status</label>
                    <select class="select" id="status" name="status">
                        <option value="">All statuses</option>
                        <option value="assigned" th:selected="${status == 'assigned'}">assigned</option>
                        <option value="returned" th:selected="${status == 'returned'}">returned</option>
                    </select>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Apply Filters</button>
                    <a class="btn btn-secondary" th:href="@{/reports}">Reset</a>
                </div>
            </form>
        </div>

        <div class="table-card">
            <h3 class="section-title">Transactions Report</h3>
            <div th:if="${#lists.isEmpty(transactions)}" class="empty-state">
                No report data found for the current filters.
            </div>
            <div th:unless="${#lists.isEmpty(transactions)}" class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Asset</th>
                            <th>Type</th>
                            <th>User</th>
                            <th>Department</th>
                            <th>Status</th>
                            <th>Issue Date</th>
                            <th>Return Date</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tx : ${transactions}">
                            <td th:text="${tx.assetName}"></td>
                            <td th:text="${tx.assetType}"></td>
                            <td th:text="${tx.userName}"></td>
                            <td th:text="${tx.department}"></td>
                            <td>
                                <span class="badge" th:classappend="' status-' + ${tx.status}" th:text="${tx.status}"></span>
                            </td>
                            <td th:text="${tx.issueDate != null ? #temporals.format(tx.issueDate, 'yyyy-MM-dd HH:mm') : ''}"></td>
                            <td th:text="${tx.returnDate != null ? #temporals.format(tx.returnDate, 'yyyy-MM-dd HH:mm') : 'Pending'}"></td>
                            <td th:text="${tx.message}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
