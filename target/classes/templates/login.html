<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-shell">
    <div class="login-card">
        <span class="brand-chip">Inventory System</span>
        <h1 class="page-title">Welcome back</h1>
        <p class="page-copy">Sign in to manage assets, assignments, returns, reports, and user records.</p>

        <div th:if="${successMessage}" class="message message-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="message message-error" th:text="${errorMessage}"></div>

        <form th:action="@{/login}" method="post" class="form-grid">
            <div>
                <label class="label" for="username">Username</label>
                <input class="field" id="username" name="username" type="text" placeholder="Enter username" required>
            </div>

            <div>
                <label class="label" for="password">Password</label>
                <input class="field" id="password" name="password" type="password" placeholder="Enter password" required>
            </div>

            <button class="btn btn-primary" type="submit">Login</button>
        </form>

        <p class="small-note" style="margin-top: 18px;">Default login: <strong>admin / admin123</strong></p>
    </div>
</body>
</html>
